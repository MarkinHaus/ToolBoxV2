site_name: ToolBoxV2 Docs
site_url: https://MarkinHaus.github.io/ToolBoxV2
site_description: Modulares Python-Framework für Tools, Funktionen und komplette Anwendungen.
repo_url: https://github.com/MarkinHaus/ToolBoxV2
repo_name: MarkinHaus/ToolBoxV2
edit_uri: edit/master/docs/
copyright: "© 2022–2026 Markin Hausmanns"

theme:
  name: material
  language: de
  # TBJS Glass — dark mode only (main_style.md: "Two moods, not two themes";
  # Docs fahren bewusst nur die dunkle.)
  palette:
    scheme: slate
    primary: black
    accent: blue
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  icon: { repo: fontawesome/brands/github }
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit

extra_css:
  - assets/stylesheets/extra.css

markdown_extensions:
  - abbr
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - admonition
  - pymdownx.details
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight: { anchor_linenums: true, linenums: false }
  - pymdownx.inlinehilite
  - pymdownx.tabbed: { alternate_style: true }
  - toc: { permalink: true, toc_depth: 3 }

plugins:
  - search: { lang: [de, en] }
  - redirects:
      redirect_maps:
        core/ServiceManager.MD: runtime/service_manager.md
        core/TauriApp_Architecture.md: frontend/tauri.md
        core/blob_sharing_api.md: storage/blob_sharing_api.md
        core/changelog.md: reference/changelog.md
        core/clis.md: services/cli.md
        core/first_run.md: foundations/first_run.md
        core/isaa.md: mods/isaa/reference.md
        core/logs.md: reference/logs.md
        core/onboarding.md: foundations/onboarding.md
        core/p2p_rpc_protocol.md: frontend/p2p_rpc.md
        core/quickstart.md: foundations/quickstart.md
        core/tbjs.md: frontend/tbjs.md
        core/toolbox_guidelines.md: devdocs/guidelines.md
        core/toolboxv2.md: reference/toolboxv2.md
        core/workers.md: runtime/workers_core.md
        tb_browser/index.md: frontend/tb_browser.md
        toolboxv2/flows/adaptive_prompt_system.md: flows/adaptive_prompt_system.md
        toolboxv2/flows/bg.md: flows/bg.md
        toolboxv2/flows/chain.md: flows/chain.md
        toolboxv2/flows/howto_minicli_macros.md: flows/minicli.md
        toolboxv2/flows/icli.md: flows/icli.md
        toolboxv2/mods/CloudM/DEVELOPER_GUIDE.md: mods/CloudM/developer_guide.md
        toolboxv2/mods/CloudM/USER_GUIDE.md: mods/CloudM/user_guide.md
        toolboxv2/mods/CloudM/auth.md: mods/CloudM/auth.md
        toolboxv2/mods/CloudM/dashboards.md: mods/CloudM/dashboards.md
        toolboxv2/mods/CloudM/folder_sync.md: mods/CloudM/folder_sync.md
        toolboxv2/mods/CloudM/index.md: mods/CloudM/index.md
        toolboxv2/mods/CloudM/login_system.md: mods/CloudM/login_system.md
        toolboxv2/mods/CloudM/mod_manager.md: mods/CloudM/mod_manager.md
        toolboxv2/mods/CloudM/user_data.md: mods/CloudM/user_data.md
        toolboxv2/utils/extras/mkdocs.md: devdocs/docs_toolchain.md
        toolboxv2/utils/workers/config.md: runtime/config.md
        toolboxv2/utils/workers/debug_runner.md: runtime/debug_runner.md
        toolboxv2/utils/workers/event_manager.md: runtime/event_manager.md
        toolboxv2/utils/workers/fast/FASTTB_DOCS.md: runtime/fasttb.md
        toolboxv2/utils/workers/fast_tb_handler.md: runtime/fast_tb_handler.md
        toolboxv2/utils/workers/server_worker.md: runtime/server_worker.md
        toolboxv2/utils/workers/session.md: runtime/session.md
        toolboxv2/utils/workers/session_custom.md: runtime/session_custom.md
        toolboxv2/utils/workers/tauri_integration.md: runtime/tauri_integration.md
        toolboxv2/utils/workers/toolbox_integration.md: runtime/toolbox_integration.md
        toolboxv2/utils/workers/ws_bridge.md: runtime/ws_bridge.md
        workers/index.md: runtime/index.md
  - mkdocstrings:
      handlers:
        python:
          paths: ["."]
          options:
            show_root_heading: true
            show_source: true
            docstring_style: google
            filters: ["!^_"]

