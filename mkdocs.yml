site_name: ToolBoxV2 Docs
site_url: https://MarkinHaus.github.io/ToolBoxV2
repo_url: https://github.com/MarkinHaus/ToolBoxV2
repo_name: ToolBoxV2

theme:
  name: material
  palette:
    scheme: slate
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.highlight
    - content.code.copy
  custom_dir: "docs/overrides"

extra_css:
  - assets/stylesheets/extra.css

markdown_extensions:
  - attr_list
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight:
      linenums: false
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["toolboxv2"]

