name: desktop
version: "0.1.28"
enabled: true
immutable: false
description: "Tauri desktop integration — native window, tray, UI widgets"
files:
  # ── Tauri CLI ──────────────────────────────────────────────
  - "utils/clis/tauri_cli.py"
  # ── Tauri Integration (workers) ────────────────────────────
  - "utils/workers/tauri_integration.py"
  # ── Desktop Widgets ────────────────────────────────────────
  - "utils/extras/base_widget.py"
  - "utils/extras/show_and_hide_console.py"
  - "utils/extras/qr.py"
  - "utils/extras/pt_spinner_patch.py"
  - "flows/desktop/*"
imports: []
dependencies:
    - "pygetwindow"
    - "pyautogui"
    - "google-auth-oauthlib"
    - "google-api-python-client"
    - "dateparser"
    - "pyperclip"
    - "webrtcvad"
    - "customtkinter"
requires:
  - "core"
commands:
  - "tb gui"
