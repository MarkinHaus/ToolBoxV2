name: isaa
version: "0.1.25"
enabled: false
immutable: false
description: "ISAA agent system — LLM integration, coding agents, MCP server, ContainerManager"
files:
  # ── ISAA Agent ─────────────────────────────────────────────
  - "mods/isaa/*"
  # ── MCP Server ─────────────────────────────────────────────
  - "mcp_server/*"
