name: isaa
version: "0.1.26"
enabled: false
immutable: false
description: "ISAA agent system — LLM integration, coding agents, MCP server, ContainerManager"
files:
  # ── ISAA Agent ─────────────────────────────────────────────
  - "mods/isaa/*"
  # ── MCP Server ─────────────────────────────────────────────
  - "mcp_server/*"
  # ── Container Manager ──────────────────────────────────────
  - "mods/ContainerManager/*"
  # ── ISAA CLI ───────────────────────────────────────────────
  - "utils/clis/tcm_p2p_cli.py"
imports: []
dependencies:
    - "networkx"
    - "numpy"
    - "litellm"
    - "dill"
    - "groq"
    - "pypdf2"
    - "nest-asyncio"
    - "pyvis"
    - "mcp"
    - "tenacity"
    - "html2text"
    - "chardet"
    - "faiss-cpu"
    - "playwright"
requires:
  - "core"
commands:
  - "mcp"
