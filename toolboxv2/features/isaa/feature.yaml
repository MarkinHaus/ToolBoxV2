  - "pydantic>=2.5.0"
  - "groq>=0.31.0"
  - "requests>=2.31.0"
  - "tiktoken>=0.5.0"
  - "tqdm>=4.66.0"
  - "pypdf2>=3.0.1"
  - "nest-asyncio>=1.5.0"
  - "schedule>=1.2.0"
  - "pyvis>=0.3.0"
  - "redis>=5.0.0"
  - "python-a2a[all]>=0.5.1"
  - "mcp>=1.6.0"
  - "google-cloud-aiplatform>=1.38.0"
  - "pyyaml>=6.0"
  - "docker>=7.0.0"
  - "hnswlib>=0.8.0"
  - "inquirer>=3.4.1"
  - "tenacity>=9.1.2"
  - "opentelemetry-api>=1.36.0"
