name: web
version: "0.1.28"
enabled: true
immutable: false
description: "Web server — HTTP/WebSocket workers, Starlette, icli_web + Minu mods"
files:
  # ── Workers ────────────────────────────────────────────────
  - "utils/workers/*"
  # ── Web Assets ─────────────────────────────────────────────
  - "dist/*"
  # ── Web Mods ───────────────────────────────────────────────
  - "mods/Minu/*"
  - "flows/web/*"
  - "tbjs/dist/*"
imports: []
dependencies:
    - "websockets"
    - "webauthn"
    - "waitress"
requires:
  - "core"
commands:
  - "workers"
  - "http_worker"
  - "ws_worker"
