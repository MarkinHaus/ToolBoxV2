name: web
version: "0.1.25"
enabled: true
immutable: false
description: "Web server — HTTP/WebSocket workers, Starlette, icli_web + Minu mods"
files:
  # ── Workers ────────────────────────────────────────────────
  - "utils/workers/*"
  # ── Web Assets ─────────────────────────────────────────────
  - "web/*"
  - "dist/*"
  # ── Web Mods ───────────────────────────────────────────────
  - "mods/icli_web/*"
  - "mods/Minu/*"
imports: []
dependencies:
  - "starlette>=0.47.3"
  - "uvicorn>=0.34.0"
  - "httpx>=0.28.1"
  - "aiohttp>=3.12.15"
  - "aiohttp-cors>=0.8.1"
  - "websockets>=15.0.1"
  - "waitress>=3.0.2"
requires:
  - "core"
commands:
  - "workers"
  - "http_worker"
  - "ws_worker"
