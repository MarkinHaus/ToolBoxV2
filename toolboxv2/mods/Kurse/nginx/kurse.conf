# /etc/nginx/sites-available/kurse.conf
# kurse.simplecore.app -> Kurse FastTB worker.
# HTTP only on purpose: run `certbot --nginx -d kurse.simplecore.app`
# afterwards and certbot injects the 443 server + redirect itself.
#
#   ln -s /etc/nginx/sites-available/kurse.conf /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d kurse.simplecore.app

upstream kurse_backend {
    server 127.0.0.1:5010;      # Kurse worker (tb -c Kurse web --port 5010)
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name kurse.simplecore.app;

    client_max_body_size 25M;   # session HTML pastes

    # certbot webroot challenge (leave in place for renewals)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # static assets: let nginx cache them
    location /static/ {
        proxy_pass http://kurse_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_cache_valid 200 5m;
        expires 5m;
    }

    location / {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://kurse_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
