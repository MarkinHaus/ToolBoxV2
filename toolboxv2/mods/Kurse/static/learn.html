<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kurse</title>
<style>
  :root { --ink:#111; --bg:#f6f5f2; --acc:#4AEDD9; --line:#111; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; font-family:system-ui,sans-serif; color:var(--ink); background:var(--bg); }
  #app { display:flex; flex-direction:column; height:100%; }
  .k-gate { max-width:420px; margin:12vh auto; padding:24px; background:#fff;
            border:3px solid var(--line); box-shadow:6px 6px 0 var(--line); }
  .k-gate h1 { margin-top:0; }
  .k-gate input { width:100%; padding:12px; font-size:16px; border:3px solid var(--line); margin:8px 0 14px; }
  .k-gate button, .k-bar button { cursor:pointer; font-weight:700; border:3px solid var(--line);
            background:var(--acc); padding:10px 16px; box-shadow:4px 4px 0 var(--line); }
  .k-gate button:active, .k-bar button:active { transform:translate(2px,2px); box-shadow:2px 2px 0 var(--line); }
  .k-bar { display:flex; align-items:center; gap:10px; padding:10px 14px;
           background:#fff; border-bottom:3px solid var(--line); }
  .k-dots { display:flex; gap:6px; flex:1; overflow-x:auto; }
  .k-dot { min-width:34px; background:#fff; }
  .k-dot.on { background:var(--acc); }
  .k-me { font-weight:700; }
  .k-bar button:disabled { opacity:.35; cursor:default; }
  #k-stage { flex:1; width:100%; border:0; background:#fff; }
  .k-cheer { padding:16px; text-align:center; font-weight:700; font-size:18px;
             background:var(--acc); border-top:3px solid var(--line); }
</style>
</head>
<body>
  <div id="app"></div>
  <script src="/static/kurse.js"></script>
  <script>Kurse.boot(document.getElementById("app"));</script>
</body>
</html>
