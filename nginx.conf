# /etc/nginx/nginx.conf
# ToolBoxV2 + LLM Gateway Compatible Configuration
# Dynamically loads sites from sites-enabled/ and box-enabled/
#
# Setup:
#   sudo cp nginx.conf /etc/nginx/nginx.conf
#   sudo mkdir -p /etc/nginx/sites-available /etc/nginx/sites-enabled
#   sudo mkdir -p /etc/nginx/box-available /etc/nginx/box-enabled
#   sudo nginx -t && sudo systemctl reload nginx

user nginx;
pid /run/nginx.pid;
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # ===========================================
    # Basic Settings
    # ===========================================
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off;

    # Buffers
    client_body_buffer_size 128k;
    client_max_body_size 100M;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 16k;

    # Timeouts
    client_body_timeout 60s;
    client_header_timeout 60s;
    send_timeout 60s;

    # ===========================================
    # Logging
    # ===========================================
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    log_format json escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_time":"$upstream_response_time",'
        '"user_agent":"$http_user_agent"'
    '}';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # ===========================================
    # Gzip Compression
    # ===========================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/woff
        font/woff2;

    # ===========================================
    # Rate Limiting Zones (used by site configs)
    # ===========================================
    # ToolBox rate limits
    limit_req_zone $binary_remote_addr zone=tb_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=tb_auth_limit:10m rate=5r/s;

    # LLM Gateway rate limits
    limit_req_zone $binary_remote_addr zone=llm_limit:10m rate=30r/s;

    # General API rate limit
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

    limit_req_status 429;

    # ===========================================
    # Connection Limiting
    # ===========================================
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    limit_req_zone $binary_remote_addr zone=download_limit:10m rate=5r/s;
    # ===========================================
    # Proxy Settings (defaults for all upstreams)
    # ===========================================
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;

    # ===========================================
    # SSL Settings (used when certbot adds SSL)
    # ===========================================
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ===========================================
    # Map for WebSocket upgrade
    # ===========================================
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # ===========================================
    # Include Site Configurations
    # ===========================================

    # Standard nginx sites (LLM Gateway, other services)
    include /etc/nginx/sites-enabled/*;

    # ToolBoxV2 specific sites
    include /etc/nginx/box-enabled/*;
}
