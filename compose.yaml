# ============================================================================
# ToolBoxV2 — Production Compose Stack
# ============================================================================
#
# Usage:
#   docker compose up                                  # Worker + nginx only
#   docker compose --profile host up                   # + Host-TB (Docker controller)
#   docker compose --profile redis up                  # + Redis DB backend
#   docker compose --profile minio up                  # + MinIO object storage
#   docker compose --profile postgres up               # + PostgreSQL
#   docker compose --profile monitoring up             # + OpenTelemetry Collector
#   docker compose --profile llm up                    # + LLM Gateway
#   docker compose --profile ollama up                 # + Ollama (LLM backend)
#   docker compose --profile registry up               # + TB Package Registry
#
# Combine freely:
#   docker compose --profile redis --profile llm --profile monitoring up
#
# Scale workers:
#   docker compose up --scale tb-worker=4
#
# External DB (no profile needed — just set env vars):
#   REDIS_URL=redis://my-host:6379 docker compose up
#
# ============================================================================

x-tb-common: &tb-common
  image: ${TB_IMAGE:-toolboxv2:latest}
  env_file: .env
  environment:
    - TB_ENV=${TB_ENV:-production}
    - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
    - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
    - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
    - DB_MODE_KEY=${DB_MODE_KEY:-CB}
    - CONTAINER_ADMIN_KEY=${CONTAINER_ADMIN_KEY:-}
    - TB_COOKIE_SECRET=${TB_COOKIE_SECRET:-change-me-in-production}
    - TB_JWT_SECRET=${TB_JWT_SECRET:-change-me-in-production}
  networks:
    - tb-internal
  restart: unless-stopped

# ============================================================================
# SERVICES
# ============================================================================

services:

  # --------------------------------------------------------------------------
  # tb-worker — default TB instance(s), scalable
  # --------------------------------------------------------------------------
  tb-worker:
    <<: *tb-common
    command: ${TB_WORKER_CMD:-tb workers start}
    volumes:
      - tb-data:/data
      - tb-config:/home/toolbox/.config
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    expose:
      - "8000"
      - "8001"
      - "5555-5558"
    deploy:
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback

  # --------------------------------------------------------------------------
  # tb-host — central controller TB (optional)
  # Mounts Docker socket to manage other containers.
  # Can also run on bare metal — this is the Compose-internal variant.
  # --------------------------------------------------------------------------
  tb-host:
    <<: *tb-common
    container_name: tb-host
    command: ${TB_HOST_CMD:-tb workers start}
    profiles: [host]
    volumes:
      - tb-data:/data
      - tb-config:/home/toolbox/.config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TB_ENV=${TB_ENV:-production}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - DB_MODE_KEY=${DB_MODE_KEY:-CB}
      - CONTAINER_ADMIN_KEY=${CONTAINER_ADMIN_KEY:-}
      - TB_COOKIE_SECRET=${TB_COOKIE_SECRET:-change-me-in-production}
      - TB_JWT_SECRET=${TB_JWT_SECRET:-change-me-in-production}
      - TB_IS_HOST=1
    ports:
      - "${TB_HOST_HTTP_PORT:-5000}:8000"
      - "${TB_HOST_WS_PORT:-6587}:8001"
    depends_on:
      tb-worker:
        condition: service_started
    security_opt:
      - no-new-privileges:true

  # --------------------------------------------------------------------------
  # nginx — reverse proxy, only externally exposed service
  # --------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: tb-nginx
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/box-enabled:/etc/nginx/box-enabled:ro
      - nginx-cache:/var/cache/nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    networks:
      - tb-internal
      - tb-exposed
    depends_on:
      tb-worker:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # --------------------------------------------------------------------------
  # redis — TBEF.DB backend (optional, profile: redis)
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: tb-redis
    profiles: [redis]
    command: redis-server --appendonly yes --maxmemory ${REDIS_MAXMEM:-256mb} --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - tb-internal
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # minio — S3-compatible object storage (optional, profile: minio)
  # --------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: tb-minio
    profiles: [minio]
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    networks:
      - tb-internal
    expose:
      - "9000"
      - "9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: tb-minio-init
    profiles: [minio]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set tb http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb tb/user-data-enc --ignore-existing;
      mc mb tb/system-audit-logs --ignore-existing;
      mc mb tb/packages --ignore-existing;
      exit 0;
      "
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    networks:
      - tb-internal

  # --------------------------------------------------------------------------
  # postgres — relational DB (optional, profile: postgres)
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: tb-postgres
    profiles: [postgres]
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-toolboxv2}
      - POSTGRES_USER=${POSTGRES_USER:-toolbox}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - tb-internal
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-toolbox}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # otel-collector — OpenTelemetry (optional, profile: monitoring)
  # --------------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: tb-otel
    profiles: [monitoring]
    volumes:
      - ./docker/otel/otel-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    networks:
      - tb-internal
    expose:
      - "4317"   # OTLP gRPC
      - "4318"   # OTLP HTTP
      - "8888"   # Prometheus metrics
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # llm-gateway — OpenAI-compatible API gateway (optional, profile: llm)
  # --------------------------------------------------------------------------
  llm-gateway:
    build:
      context: ./llm-gateway
      dockerfile: Dockerfile
    container_name: tb-llm-gateway
    profiles: [llm]
    environment:
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - PYTHONUNBUFFERED=1
    volumes:
      - llm-gateway-data:/app/data
    networks:
      - tb-internal
    expose:
      - "4000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # ollama — LLM inference backend (optional, profile: ollama)
  # --------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: tb-ollama
    profiles: [ollama]
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - tb-internal
    expose:
      - "11434"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    # Uncomment for GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # --------------------------------------------------------------------------
  # tb-registry — package registry (optional, profile: registry)
  # --------------------------------------------------------------------------
  tb-registry:
    build:
      context: ./tb-registry
      dockerfile: Dockerfile
    container_name: tb-registry
    profiles: [registry]
    environment:
      - HOST=0.0.0.0
      - PORT=4025
      - DATABASE_URL=sqlite:///./data/registry.db
      - MINIO_PRIMARY_ENDPOINT=${REGISTRY_MINIO_ENDPOINT:-minio:9000}
      - MINIO_PRIMARY_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_PRIMARY_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_PRIMARY_BUCKET=packages
      - MINIO_PRIMARY_SECURE=false
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY:-}
      - CLERK_PUBLISHABLE_KEY=${CLERK_PUBLISHABLE_KEY:-}
    volumes:
      - registry-data:/app/data
    networks:
      - tb-internal
    expose:
      - "4025"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4025/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

# ============================================================================
# NETWORKS
# ============================================================================

networks:
  tb-internal:
    driver: bridge
    internal: true
  tb-exposed:
    driver: bridge

# ============================================================================
# VOLUMES
# ============================================================================

volumes:
  tb-data:
  tb-config:
  nginx-cache:
  redis-data:
  minio-data:
  postgres-data:
  llm-gateway-data:
  ollama-data:
  registry-data:
