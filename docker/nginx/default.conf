# ============================================================================
# ToolBoxV2 Compose — nginx reverse proxy
# ============================================================================

upstream tb_workers {
    # docker compose DNS resolves 'tb-worker' to all scaled instances
    server tb-worker:8000;
    keepalive 32;
}

upstream tb_ws {
    server tb-worker:8001;
    keepalive 16;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=10r/s;

server {
    listen 80;
    server_name ${TB_NGINX_SERVER_NAME:-localhost};

    # -- Gzip ----------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types application/json application/javascript text/css text/plain text/html;

    # -- Security headers ----------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    client_max_body_size 50M;

    # -- Health (no rate limit) ----------------------------------------------
    location /health {
        proxy_pass http://tb_workers;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # -- WebSocket endpoint --------------------------------------------------
    location /ws {
        limit_req zone=ws_limit burst=20 nodelay;

        proxy_pass http://tb_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # -- API -----------------------------------------------------------------
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://tb_workers;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # -- LLM Gateway (proxied if running) ------------------------------------
    location /llm/ {
        proxy_pass http://tb-llm-gateway:4000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
    }

    # -- Registry (proxied if running) ---------------------------------------
    location /registry/ {
        proxy_pass http://tb-registry:4025/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        client_max_body_size 100M;
    }

    # -- Container proxy locations (loaded dynamically) ----------------------
    include /etc/nginx/box-enabled/*.conf;

    # -- Static / catch-all --------------------------------------------------
    location / {
        proxy_pass http://tb_workers;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
    }

    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
