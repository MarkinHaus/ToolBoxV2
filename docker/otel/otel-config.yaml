# ============================================================================
# OpenTelemetry Collector — ToolBoxV2
# ============================================================================

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

  memory_limiter:
    check_interval: 5s
    limit_mib: 256
    spike_limit_mib: 64

exporters:
  # Log to stdout for debugging
  debug:
    verbosity: basic

  # Forward to OpenObserve (if configured)
  # otlphttp:
  #   endpoint: ${OPENOBSERVE_ENDPOINT}/api/default
  #   headers:
  #     Authorization: "Basic ${OPENOBSERVE_TOKEN}"

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
