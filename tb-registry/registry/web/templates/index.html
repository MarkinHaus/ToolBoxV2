<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TB Registry</title>
  <link rel="stylesheet" href="/static/css/registry.css">
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="/" class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
          <line x1="12" y1="22.08" x2="12" y2="12"/>
        </svg>
        TB Registry
      </a>
      <div class="search-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="search" placeholder="Search packages..." autocomplete="off">
      </div>
      <nav class="nav">
        <a href="/">Browse</a>
        <a href="/docs">Docs</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1>TB Registry</h1>
      <p>Package registry for the ToolBox Framework</p>
      <div class="stats" id="stats">
        <div class="stat"><span class="stat-value" id="pkg-count">-</span><span class="stat-label">Packages</span></div>
        <div class="stat"><span class="stat-value" id="art-count">-</span><span class="stat-label">Artifacts</span></div>
      </div>
    </section>

    <section class="section" id="pkg-section">
      <h2 class="section-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
        </svg>
        Packages
      </h2>
      <div id="packages" class="pkg-grid">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </section>

    <section class="section" id="art-section">
      <h2 class="section-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
        Artifacts
      </h2>
      <div id="artifacts" class="pkg-grid">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      TB Registry &copy; 2025 &middot;
      <a href="https://simplecore.app">SimpleCore.app</a> &middot;
      <a href="https://github.com/MarkinHaus/ToolBoxV2">GitHub</a>
    </div>
  </footer>

  <script>
    const API = '/api/v1';

    function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

    async function fetchStats() {
      try {
        const [pkgRes, artRes] = await Promise.all([
          fetch(`${API}/packages?per_page=1`),
          fetch(`${API}/artifacts?per_page=1`),
        ]);
        if (pkgRes.ok) { const d = await pkgRes.json(); document.getElementById('pkg-count').textContent = d.total ?? 0; }
        if (artRes.ok) { const d = await artRes.json(); document.getElementById('art-count').textContent = d.total ?? 0; }
      } catch {
        document.getElementById('pkg-count').textContent = '0';
        document.getElementById('art-count').textContent = '0';
      }
    }

    function renderCard(name, version, desc, metaItems, typeLabel) {
      const metaHtml = (metaItems || []).map(m => `<span>${m}</span>`).join('');
      return `
        <a href="/package/${encodeURIComponent(name)}" class="pkg-card">
          <div class="pkg-header">
            <span class="pkg-name">${esc(name)}</span>
            ${typeLabel ? `<span class="type-badge">${typeLabel}</span>` : `<span class="pkg-version">v${esc(version || '0.0.0')}</span>`}
          </div>
          <p class="pkg-desc">${esc(desc || 'No description')}</p>
          <div class="pkg-meta">${metaHtml}</div>
        </a>
      `;
    }

    async function fetchPackages(query) {
      const container = document.getElementById('packages');
      container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
      try {
        let pkgs = [];
        if (query) {
          const res = await fetch(`${API}/search?q=${encodeURIComponent(query)}`);
          if (res.ok) { const data = await res.json(); pkgs = data.results || data.packages || []; }
        } else {
          const res = await fetch(`${API}/packages?per_page=24`);
          if (res.ok) { const data = await res.json(); pkgs = data.packages || []; }
        }
        if (!pkgs.length) {
          container.innerHTML = '<div class="empty"><div class="empty-icon">📦</div>No packages found</div>';
          return;
        }
        container.innerHTML = pkgs.map(p => renderCard(
          p.name, p.latest_version, p.description,
          [`📥 ${p.total_downloads || p.downloads || 0}`, `🏷️ ${esc(p.package_type || 'mod')}`],
          null
        )).join('');
      } catch {
        container.innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div>Failed to load packages</div>';
      }
    }

    async function fetchArtifacts() {
      const container = document.getElementById('artifacts');
      container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
      try {
        const res = await fetch(`${API}/artifacts?per_page=12`);
        const data = await res.json();
        const arts = data.artifacts || [];
        if (!arts.length) {
          container.innerHTML = '<div class="empty"><div class="empty-icon">🖥️</div>No artifacts yet</div>';
          return;
        }
        const typeMap = { 'tauri_app':'App', 'cli_executable':'CLI', 'browser_extension':'Extension', 'mobile_app':'Mobile', 'library':'Library' };
        container.innerHTML = arts.map(a => renderCard(
          a.name, a.latest_version, a.description,
          [`🏷️ v${esc(a.latest_version || '-')}`],
          typeMap[a.artifact_type] || a.artifact_type
        )).join('');
      } catch {
        container.innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div>Failed to load artifacts</div>';
      }
    }

    let debounce;
    document.getElementById('search').addEventListener('input', e => {
      clearTimeout(debounce);
      const q = e.target.value.trim();
      debounce = setTimeout(() => {
        const artSection = document.getElementById('art-section');
        if (q) { artSection.style.display = 'none'; fetchPackages(q); }
        else { artSection.style.display = ''; fetchPackages(); }
      }, 300);
    });

    const params = new URLSearchParams(window.location.search);
    const initialQ = params.get('q');
    if (initialQ) {
      document.getElementById('search').value = initialQ;
      document.getElementById('art-section').style.display = 'none';
      fetchPackages(initialQ);
    } else {
      fetchPackages();
    }

    fetchStats();
    fetchArtifacts();
  </script>
</body>
</html>
