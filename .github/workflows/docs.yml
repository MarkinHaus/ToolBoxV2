name: docs
on:
    push: { branches: [master] }
    pull_request: { paths: ["docs/**", "mkdocs.yml", ".github/workflows/docs.yml"] }
permissions: { contents: write }
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v4
                with: { fetch-depth: 0 }
            -   uses: actions/setup-python@v5
                with: { python-version: "3.11", cache: pip }
            -   name: Install toolboxv2 + docs toolchain
                run: |
                    python -m pip install --upgrade pip
                    pip install -e .
                    pip install mkdocs mkdocs-material 'mkdocstrings[python]' mkdocs-redirects
                    python -c "import toolboxv2"
            -   name: Build
                run: mkdocs build --clean
            -   name: Check links
                run: python scripts/check_docs_links.py
            -   name: Deploy
                if: github.ref == 'refs/heads/master' && github.event_name == 'push'
                uses: peaceiris/actions-gh-pages@v4
                with:
                    github_token: ${{ secrets.GITHUB_TOKEN }}
                    publish_dir: ./site
